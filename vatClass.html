<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="height: 700px;width: 600px; border: 2px solid black;">
        <h2>Registration And Order form</h2>
        <h4>Personal Information</h4>
        <div style="height: 180px;width: 570px; border: 2px solid black; display:flex">
            <form action="">
                <br>
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Username">
                <br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Email">
                <br><br>
                <label for="Phone">Phone:</label>
                <input type="phone" placeholder="Phone">
                <br><br>
                <label for="Country">Country</label>
                <input type="country" placeholder="Country">
            </form>
        </div>

        <h4>Preferences</h4>
        <div style="height: 150px;width: 570px; border: 2px solid black; display:flex">
            <form action="">
                <br>
                <label for="Phone">Department</label>
                <select name="" id="" aria-placeholder="Select a department">
                    <option value="">VAT Class</option>
                    <option value="">VAT Class 1</option>
                    <option value="">VAT Class 2</option>
                    <option value="">VAT Class 3</option>
                </select>
                <br><br>
                <label for="Phone">Receive Newsletter</label> <br>
                <input type="checkbox" name="" id="" > <label>Yes, email me updates</LAbel>
            </form>
        </div>

        <h4>Feedback</h4>
        <div style="height: 50px; width: 570px; border: 2px solid black; display:flex; flex-direction: column;">
            <label for="">Comments and Questions</label>
            <textarea name="" id="" placeholder="Write your message here"></textarea>
        </div>

        <h4>Order Summary</h4>
        <div style="height: 100px; width: 570px; border: 2px solid black; display:flex; flex-direction: column;">
            <label for="">Items:</label>
            <textarea name="" id="" placeholder="List the items you want to order"></textarea>
        </div>

        <button>Submit</button>
    </div>
</body>
</html>
